<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가위 바위 보 배치하기</title>
    <style>
        /* 1. 전체 페이지 중앙 정렬 및 배경색 */
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        h1 {
            color: #333333;
            margin-top: 50px;
            margin-bottom: 30px;
        }

        /* 2. 가위, 바위, 보 카드들을 가로로 나란히 정렬하는 상자 */
        .game-container {
            display: flex;            /* 요소들을 가로로 정렬해주는 속성 */
            justify-content: center;  /* 가운데로 모아주기 */
            gap: 30px;                /* 카드와 카드 사이의 간격 */
            padding: 20px;
            flex-wrap: wrap;          /* 화면이 좁아지면 자연스럽게 아래로 내려가게 함 */
        }

        /* 3. 개별 가위/바위/보 카드 스타일 */
        .card {
            background-color: #ffffff;
            border: 2px solid #e0e0e0;
            border-radius: 15px;      /* 테두리를 둥글게 */
            padding: 20px;
            width: 150px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05); /* 은은한 그림자 효과 */
        }

        /* 4. 이미지(또는 이모지) 영역 스타일 */
        .image-box {
            font-size: 5rem;          /* 이모지 크기를 크게 조절 */
            margin-bottom: 15px;
            background-color: #f1f3f5; /* 이미지 뒤쪽 연한 회색 배경 */
            padding: 10px;
            border-radius: 10px;
        }

        /* 실제 이미지 파일을 사용할 때 적용되는 스타일 */
        .image-box img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 5. 글자(텍스트) 스타일 */
        .text-box {
            font-size: 1.5rem;
            font-weight: bold;
            color: #495057;
            margin: 0;
        }
    </style>
</head>
<body>

    <h1>✊✌️✋ 가위 바위 보 게임</h1>

    <div class="game-container">

        <div class="card">
            <div class="image-box">
                ✌️
                </div>
            <p class="text-box">가위</p>
        </div>

        <div class="card">
            <div class="image-box">
                ✊
                </div>
            <p class="text-box">바위</p>
        </div>

        <div class="card">
            <div class="image-box">
                ✋
                </div>
            <p class="text-box">보</p>
        </div>

    </div>

</body>
</html>
