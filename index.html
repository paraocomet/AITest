<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>깔끔하게 정리된 페이지</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            /* 배경 이미지가 부드럽게 화면을 채우도록 수정 */
            background-image: url('사진1.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #f8f9fa; /* 이미지 로드 전이나 없을 때 보일 기본 배경색 */
            padding-top: 50px;
        }

        /* 메인 컨텐츠 박스 스타일링 */
        .content-box {
            background-color: rgba(255, 255, 255, 0.95); /* 배경 요소를 살리는 부드러운 흰색 투명도 */
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        /* 테이블 스타일 조정 */
        .table-custom {
            margin-bottom: 40px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        
        /* 특정 셀(c01)에 부드러운 강조 효과 */
        .c01 {
            background-color: #fff9db !important; /* 연한 노란색 포인트 */
            font-weight: bold;
        }

        /* 리스트 스타일 조정 */
        ol.custom-list {
            list-style-type: upper-roman;
            padding-left: 25px;
        }
        
        /* float 대신 Flexbox를 사용하거나, 깔끔한 간격 위주로 조정 */
        ol.custom-list li {
            margin: 12px 0;
            padding: 8px 15px;
            background-color: #f1f3f5;
            border-left: 5px solid #0d6efd; /* 빨간 테두리 대신 세련된 포인트 선 */
            border-radius: 4px;
            transition: all 0.2s;
        }

        ol.custom-list li:hover {
            transform: translateX(5px);
            background-color: #e7f5ff;
        }
    </style>
</head>
<body>

    <div class="container" style="max-width: 700px;">
        <div class="content-box">
            
            <h3 class="mb-4 text-secondary">📊 데이터 표</h3>
            <table class="table table-bordered table-hover table-custom text-center align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>A 열</th>
                        <th>B 열</th>
                        <th>C 열</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="c01">
                            1-1 
                            <span class="badge bg-primary ms-1">새로운 소식!</span>
                        </td>
                        <td>1-2</td>
                        <td class="c01">1-3</td>
                    </tr>
                    <tr>
                        <td>2-1</td>
                        <td class="c01">2-2</td>
                        <td>2-3</td>
                    </tr>
                </tbody>
            </table>

            <hr class="my-4">

            <h3 class="mb-3 text-secondary">📜 주요 리스트</h3>
            <ol class="custom-list">
                <li>첫번째 항목입니다.</li>
                <li>두번째 내용을 확인하세요.</li>
                <li>세번째 요소도 깔끔하게 정렬됩니다.</li>
                <li>네번째 마무리를 합니다.</li>
            </ol>

        </div>
    </div>

</body>
</html>
