<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>백해성 | AI 교육자 · 마라토너 · 예비 창업가</title>
    <style>
        /* 1. 전체 기본 스타일 : 자연스럽고 편안한 톤 */
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f4f3ef; /* 따뜻하고 편안한 연베이지색 바탕 */
            color: #4a4a4a; /* 눈이 피로하지 않은 짙은 회색 글자 */
            margin: 0;
            padding: 0;
            line-height: 1.7;
        }

        /* 2. 상단 헤더 영역 */
        header {
            background-color: #2b4c3f; /* 마음을 차분하게 만드는 딥 그린 */
            color: #ffffff;
            text-align: center;
            padding: 50px 20px;
        }

        header h1 {
            margin: 0 0 10px 0;
            font-size: 2.3rem;
            letter-spacing: 2px;
        }

        header p {
            margin: 0;
            font-size: 1.1rem;
            color: #bdc9c1; /* 은은한 허브톤 회색 부제목 */
        }

        header img {
            border: 5px solid #ffffff;
            border-radius: 50%; /* 프로필 사진처럼 둥글게 */
            margin-top: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        header figcaption {
            font-size: 0.9rem;
            color: #a3b5a9;
            margin-top: 10px;
            font-style: italic;
        }

        /* 3. 상단 내비게이션 메뉴 */
        nav {
            background-color: #3e5c4e; /* 헤더보다 살짝 밝은 초록색 */
            text-align: center;
        }

        nav ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
        }

        nav li {
            display: inline-block;
        }

        nav a {
            display: block;
            color: #ffffff;
            text-decoration: none;
            padding: 14px 18px;
            font-size: 0.95rem;
            transition: background-color 0.3s;
        }

        nav a:hover {
            background-color: #2b4c3f; /* 마우스를 올리면 차분하게 톤다운 */
        }

        /* 4. 본문을 모아주는 중앙 정렬 상자 */
        .container {
            max-width: 750px;
            margin: 40px auto;
            padding: 0 20px;
        }

            background-color: #ffffff; /* 컨텐츠 박스는 깔끔한 흰색 */
